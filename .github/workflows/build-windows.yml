name: Windows

on:
  workflow_dispatch:
    
jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Porta.Pty.slnx
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/Porta.Pty.slnx

    - name: Build
      run: dotnet build --no-restore src/Porta.Pty.slnx --property WarningLevel=0
      
    - name: Test
      run: dotnet test --no-build --verbosity normal src/Porta.Pty.slnx
